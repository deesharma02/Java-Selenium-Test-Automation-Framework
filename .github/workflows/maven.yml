name: Test Automation Workflow

on:
  schedule:
    - cron: 00 18 * * *
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Running automation framework with maven
      run:  mvn test -X -Dbrowser=chrome -DisLambdaTest=true -DisHeadless=true 

    - name: Update test logs
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: Test Logs
        path: logs/

    - name: Update test reports
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: Test Reports
        path: reports/report.html


